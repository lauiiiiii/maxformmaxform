name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        env:
          JWT_SECRET: ci-secret
        run: npm test

  smoke:
    name: Smoke (${{ matrix.entry.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        entry:
          - name: repo-root
            working_directory: .
            command: node scripts/system-smoke.mjs
          - name: frontend-npm
            working_directory: frontend
            command: npm run smoke:system

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: survey_system
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p123456 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 123456
      DB_NAME: survey_system
      FRONTEND_URL: http://127.0.0.1:63000
      JWT_SECRET: ci-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run smoke
        working-directory: ${{ matrix.entry.working_directory }}
        run: ${{ matrix.entry.command }}
